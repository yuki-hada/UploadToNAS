name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Build test version (e.g., v0.0.0-test)'
        required: false
        default: 'v0.0.0-test'

jobs:
  build-windows:
    name: Windows (modern)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: nim c -d:release -o:UploadToNAS.exe src/uploadtonas.nim

      - name: Archive
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || github.event.inputs.version }}"
          Compress-Archive -Path "UploadToNAS.exe" -DestinationPath "UploadToNAS-Windows-${tag}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-windows
          path: "*.zip"

  build-windows7:
    name: Windows 7 (cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build for Windows 7
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          nim c -d:release \
            --os:windows \
            --cpu:i386 \
            --cc:gcc \
            --gcc.exe:i686-w64-mingw32-gcc \
            --gcc.linkerexe:i686-w64-mingw32-gcc \
            --passL:"-Wl,--major-os-version,6,--minor-os-version,1,--major-subsystem-version,6,--minor-subsystem-version,1" \
            -o:UploadToNAS.exe \
            src/uploadtonas.nim
          zip "UploadToNAS-Windows7-${TAG}.zip" UploadToNAS.exe

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-windows7
          path: "*.zip"

  release:
    name: Attach to release
    needs: [build-windows, build-windows7]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'workflow_dispatch'
        with:
          files: "artifacts/*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
